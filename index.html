<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Entrenador Baloncesto - Planificador de Entrenamientos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a472a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HoopsTrainer">
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }
    body {
      background: #1a472a;
      margin: 0;
      padding: 20px;
      color: #fff;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #2c5e3a;
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .form-group {
      background: #1f3b2c;
      padding: 12px 18px;
      border-radius: 28px;
      margin-bottom: 16px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }
    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      border: none;
      font-size: 1rem;
      background: #f9c74f;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button {
      background: #f9844a;
      color: white;
      font-size: 1.2rem;
      margin-top: 8px;
    }
    button:hover {
      background: #f2702e;
      transform: scale(0.98);
    }
    .boton-pdf {
      background: #577590;
      margin-top: 0;
      margin-bottom: 10px;
    }
    .boton-pdf:hover {
      background: #3a5a6e;
    }
    .resultado {
      background: #f8f3e6;
      color: #1e2f23;
      border-radius: 28px;
      padding: 20px;
      margin-top: 25px;
      overflow-x: auto;
    }
    .ejercicio-item {
      border-bottom: 1px solid #c0b28a;
      margin-bottom: 18px;
      padding-bottom: 12px;
    }
    .grafico-svg {
      background: #e8e0d0;
      padding: 10px;
      border-radius: 20px;
      margin: 10px 0;
      display: flex;
      justify-content: center;
    }
    .grafico-svg svg {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      background: #f0ece4;
      box-shadow: inset 0 0 0 1px #c0b28a;
    }
    h3 {
      margin: 10px 0 5px;
      color: #b6622e;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 20px;
      opacity: 0.7;
    }
    /* Estilos para impresión / PDF */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .container {
        background: white;
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }
      .form-group, .boton-pdf, button, footer, h1, #generarBtn, .boton-pdf {
        display: none;
      }
      .resultado {
        background: white;
        color: black;
        padding: 0;
        margin: 0;
        border-radius: 0;
      }
      .ejercicio-item {
        border-bottom: 1px solid #ccc;
        page-break-inside: avoid;
      }
      .grafico-svg {
        background: #f5f5f5;
        border: 1px solid #ccc;
      }
      .grafico-svg svg {
        background: white;
      }
      h2, h3 {
        color: black;
      }
    }
    @media (max-width: 600px) {
      body { padding: 10px; }
      .container { padding: 15px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🏀 PLANIFICADOR DE ENTRENAMIENTOS 🏀</h1>
  <div class="form-group">
    <label>📅 Edad</label>
    <select id="edad">
      <option value="7-10">7-10 años</option>
      <option value="11-14" selected>11-14 años</option>
      <option value="15-18">15-18 años</option>
    </select>
  </div>
  <div class="form-group">
    <label>📊 Nivel</label>
    <select id="nivel">
      <option value="principiante">Principiante</option>
      <option value="intermedio" selected>Intermedio</option>
      <option value="avanzado">Avanzado</option>
    </select>
  </div>
  <div class="form-group">
    <label>🏋️ Tipo de ejercicio principal</label>
    <select id="tipo">
      <option value="fuerza">💪 Fuerza</option>
      <option value="velocidad">⚡ Velocidad</option>
      <option value="defensa">🛡️ Defensa</option>
      <option value="3x3">🏀 3x3</option>
    </select>
  </div>
  <div class="form-group">
    <label>🔢 Cantidad de ejercicios (sin contar calentamiento/estiramientos)</label>
    <select id="cantidad">
      <option value="4">4 ejercicios</option>
      <option value="5" selected>5 ejercicios</option>
      <option value="6">6 ejercicios</option>
      <option value="7">7 ejercicios</option>
      <option value="8">8 ejercicios</option>
    </select>
  </div>
  <button id="generarBtn">✨ GENERAR ENTRENAMIENTO DE 90 MIN ✨</button>
  <button id="exportarPdfBtn" class="boton-pdf">📄 EXPORTAR A PDF / IMPRIMIR</button>
  <div id="resultado" class="resultado"></div>
  <footer>PWA instalable - Gráficos de pista SVG para cada ejercicio</footer>
</div>

<script>
  // BASE DE DATOS DE EJERCICIOS
  const ejerciciosDB = {
    fuerza: [
      { nombre: "Sentadillas con salto", duracionBase: 8, material: "Ninguno", descripcion: "Control y explosividad. Descanso 45 seg." },
      { nombre: "Plancha con toque de hombros", duracionBase: 6, material: "Colchoneta", descripcion: "Control y explosividad. Descanso 45 seg." },
      { nombre: "Zancadas con balón medicinal", duracionBase: 7, material: "Balón medicinal (2-4kg)", descripcion: "Control y explosividad. Descanso 45 seg." },
      { nombre: "Saltos al cajón", duracionBase: 7, material: "Cajón plinto", descripcion: "Control y explosividad. Descanso 45 seg." },
      { nombre: "Fondos en banco", duracionBase: 6, material: "Banco", descripcion: "Control y explosividad. Descanso 45 seg." }
    ],
    velocidad: [
      { nombre: "Sprint en escalera", duracionBase: 6, material: "Escalera de agilidad", descripcion: "Máxima intensidad. Descanso activo 30 seg." },
      { nombre: "Cambios de dirección con conos", duracionBase: 8, material: "5 conos", descripcion: "Máxima intensidad. Descanso activo 30 seg." },
      { nombre: "Carrera de ida y vuelta", duracionBase: 7, material: "Conos", descripcion: "Máxima intensidad. Descanso activo 30 seg." },
      { nombre: "Persecución por parejas", duracionBase: 9, material: "Ninguno", descripcion: "Máxima intensidad. Descanso activo 30 seg." },
      { nombre: "Reacción a señal", duracionBase: 6, material: "Silbato", descripcion: "Máxima intensidad. Descanso activo 30 seg." }
    ],
    defensa: [
      { nombre: "Defensa en espejo", duracionBase: 7, material: "Ninguno", descripcion: "Posición baja, pies rápidos." },
      { nombre: "1c1 con ataque rápido", duracionBase: 9, material: "Balón", descripcion: "Posición baja, pies rápidos." },
      { nombre: "Cierre y ayuda", duracionBase: 10, material: "Balón, conos", descripcion: "Posición baja, pies rápidos." },
      { nombre: "Defensa del pick & roll", duracionBase: 10, material: "Balón", descripcion: "Posición baja, pies rápidos." },
      { nombre: "Recuperación en transición", duracionBase: 8, material: "Balón", descripcion: "Posición baja, pies rápidos." }
    ],
    tresx3: [
      { nombre: "Pases y cortes (3x0)", duracionBase: 9, material: "Balón", descripcion: "Movimiento sin balón, pases rápidos." },
      { nombre: "3x2 continuo", duracionBase: 12, material: "Balón, petos", descripcion: "Movimiento sin balón, pases rápidos." },
      { nombre: "Bloqueo indirecto", duracionBase: 10, material: "Balón", descripcion: "Movimiento sin balón, pases rápidos." },
      { nombre: "Espaciado y penetración", duracionBase: 11, material: "Balón", descripcion: "Movimiento sin balón, pases rápidos." },
      { nombre: "Recepción y finalización", duracionBase: 8, material: "Balón", descripcion: "Movimiento sin balón, pases rápidos." }
    ]
  };

  // Función para generar SVG de pista según tipo
  function generarSVG(tipo) {
    let svg = `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto;">`;
    // Fondo de cancha
    svg += `<rect width="400" height="300" fill="#d9c8a9" rx="8" />`;
    // Líneas de cancha
    svg += `<rect x="20" y="20" width="360" height="260" fill="none" stroke="#8b7355" stroke-width="2" />`;
    svg += `<line x1="200" y1="20" x2="200" y2="280" stroke="#8b7355" stroke-width="2" stroke-dasharray="8,6" />`;
    svg += `<circle cx="200" cy="150" r="30" fill="none" stroke="#8b7355" stroke-width="2" />`;
    // Círculo central
    svg += `<circle cx="200" cy="150" r="8" fill="#8b7355" />`;
    // Áreas (pintadas)
    svg += `<path d="M20 80 L80 80 L80 220 L20 220 Z" fill="#b8a080" opacity="0.4" />`;
    svg += `<path d="M380 80 L320 80 L320 220 L380 220 Z" fill="#b8a080" opacity="0.4" />`;
    // Líneas de tiro libre
    svg += `<line x1="80" y1="80" x2="80" y2="220" stroke="#8b7355" stroke-width="2" />`;
    svg += `<line x1="320" y1="80" x2="320" y2="220" stroke="#8b7355" stroke-width="2" />`;
    // Círculo de tiro libre
    svg += `<circle cx="80" cy="150" r="25" fill="none" stroke="#8b7355" stroke-width="2" />`;
    svg += `<circle cx="320" cy="150" r="25" fill="none" stroke="#8b7355" stroke-width="2" />`;

    // Dibujos específicos según tipo
    if (tipo === "fuerza") {
      // Figura haciendo sentadilla con barra
      svg += `<circle cx="200" cy="200" r="20" fill="#e67e22" />`; // cabeza
      svg += `<rect x="185" y="220" width="30" height="40" rx="10" fill="#e67e22" />`; // torso
      svg += `<line x1="185" y1="230" x2="165" y2="260" stroke="#e67e22" stroke-width="6" stroke-linecap="round" />`; // pierna izq
      svg += `<line x1="215" y1="230" x2="235" y2="260" stroke="#e67e22" stroke-width="6" stroke-linecap="round" />`; // pierna der
      svg += `<line x1="165" y1="260" x2="235" y2="260" stroke="#e67e22" stroke-width="8" stroke-linecap="round" />`; // barra
      svg += `<text x="200" y="50" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">💪 FUERZA</text>`;
    } else if (tipo === "velocidad") {
      // Flechas y conos
      svg += `<circle cx="100" cy="100" r="10" fill="#e74c3c" />`; // cono 1
      svg += `<circle cx="150" cy="150" r="10" fill="#e74c3c" />`; // cono 2
      svg += `<circle cx="200" cy="200" r="10" fill="#e74c3c" />`; // cono 3
      svg += `<circle cx="250" cy="150" r="10" fill="#e74c3c" />`; // cono 4
      svg += `<circle cx="300" cy="100" r="10" fill="#e74c3c" />`; // cono 5
      // Flecha zigzag
      svg += `<path d="M90 90 L150 150 L200 200 L250 150 L310 90" fill="none" stroke="#2980b9" stroke-width="4" marker-end="url(#arrow)" />`;
      svg += `<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2980b9" /></marker></defs>`;
      svg += `<text x="200" y="50" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">⚡ VELOCIDAD</text>`;
    } else if (tipo === "defensa") {
      // Atacante y defensor
      svg += `<circle cx="250" cy="180" r="18" fill="#e67e22" />`; // atacante
      svg += `<circle cx="150" cy="180" r="18" fill="#3498db" />`; // defensor
      svg += `<line x1="168" y1="180" x2="232" y2="180" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4,4" />`; // distancia
      svg += `<text x="250" y="210" font-size="12" fill="#e67e22" text-anchor="middle">Atacante</text>`;
      svg += `<text x="150" y="210" font-size="12" fill="#3498db" text-anchor="middle">Defensor</text>`;
      svg += `<path d="M130 160 Q150 140 170 160" fill="none" stroke="#3498db" stroke-width="2" />`; // movimiento defensor
      svg += `<text x="200" y="50" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">🛡️ DEFENSA</text>`;
    } else if (tipo === "3x3") {
      // Tres jugadores en triángulo
      svg += `<circle cx="200" cy="100" r="18" fill="#e67e22" />`; // jugador 1
      svg += `<circle cx="140" cy="220" r="18" fill="#3498db" />`; // jugador 2
      svg += `<circle cx="260" cy="220" r="18" fill="#2ecc71" />`; // jugador 3
      svg += `<line x1="200" y1="100" x2="140" y2="220" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4,4" />`; // pase
      svg += `<line x1="200" y1="100" x2="260" y2="220" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4,4" />`; // pase
      svg += `<line x1="140" y1="220" x2="260" y2="220" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4,4" />`; // pase
      svg += `<text x="200" y="90" font-size="12" fill="#e67e22" text-anchor="middle">1</text>`;
      svg += `<text x="140" y="250" font-size="12" fill="#3498db" text-anchor="middle">2</text>`;
      svg += `<text x="260" y="250" font-size="12" fill="#2ecc71" text-anchor="middle">3</text>`;
      svg += `<text x="200" y="50" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">🏀 3x3</text>`;
    }
    svg += `</svg>`;
    return svg;
  }

  function obtenerListaEjercicios(tipoPrincipal, cantidad) {
    let lista = [];
    let tipoPrimario = tipoPrincipal;
    let tipoSecundario = (tipoPrincipal === "fuerza") ? "velocidad" : (tipoPrincipal === "velocidad") ? "fuerza" : "defensa";
    
    let poolPrincipal = [...ejerciciosDB[tipoPrimario]];
    for (let i = 0; i < Math.ceil(cantidad / 2); i++) {
      if (poolPrincipal.length === 0) poolPrincipal = [...ejerciciosDB[tipoPrimario]];
      let idx = Math.floor(Math.random() * poolPrincipal.length);
      lista.push({ ...poolPrincipal[idx], tipo: tipoPrimario });
      poolPrincipal.splice(idx, 1);
      if (lista.length >= cantidad) break;
    }
    if (lista.length < cantidad) {
      let poolSec = [...ejerciciosDB[tipoSecundario]];
      while (lista.length < cantidad && poolSec.length > 0) {
        let idx = Math.floor(Math.random() * poolSec.length);
        lista.push({ ...poolSec[idx], tipo: tipoSecundario });
        poolSec.splice(idx, 1);
      }
    }
    if (lista.length < cantidad) {
      let otrosTipos = ["fuerza","velocidad","defensa","tresx3"].filter(t => t !== tipoPrimario && t !== tipoSecundario);
      let poolOtros = [];
      otrosTipos.forEach(t => poolOtros.push(...ejerciciosDB[t]));
      while (lista.length < cantidad && poolOtros.length > 0) {
        let idx = Math.floor(Math.random() * poolOtros.length);
        lista.push({ ...poolOtros[idx], tipo: "otro" });
        poolOtros.splice(idx, 1);
      }
    }
    while (lista.length < cantidad) {
      lista.push({ ...ejerciciosDB[tipoPrimario][0] });
    }
    return lista.slice(0, cantidad);
  }

  function generarEntrenamiento() {
    const edad = document.getElementById("edad").value;
    const nivel = document.getElementById("nivel").value;
    const tipo = document.getElementById("tipo").value;
    const cantidadEjercicios = parseInt(document.getElementById("cantidad").value);
    
    const ejerciciosSeleccionados = obtenerListaEjercicios(tipo, cantidadEjercicios);
    const tiempoPrincipal = 70;
    let duraciones = [];
    let suma = 0;
    for (let i = 0; i < ejerciciosSeleccionados.length; i++) {
      let base = ejerciciosSeleccionados[i].duracionBase;
      let factor = 1;
      if (nivel === "principiante") factor = 0.9;
      if (nivel === "avanzado") factor = 1.1;
      if (edad === "7-10") factor *= 0.8;
      if (edad === "15-18") factor *= 1.1;
      let duracion = Math.round(base * factor);
      duraciones.push(duracion);
      suma += duracion;
    }
    if (suma !== tiempoPrincipal && suma > 0) {
      let ajuste = tiempoPrincipal / suma;
      duraciones = duraciones.map(d => Math.max(4, Math.round(d * ajuste)));
      let nuevaSuma = duraciones.reduce((a,b)=>a+b,0);
      if (nuevaSuma !== tiempoPrincipal) {
        duraciones[0] += (tiempoPrincipal - nuevaSuma);
      }
    }
    
    let html = `<div><h2>🏆 ENTRENAMIENTO DE 90 MINUTOS 🏆</h2>
    <p><strong>Edad:</strong> ${edad}  |  <strong>Nivel:</strong> ${nivel}  |  <strong>Énfasis:</strong> ${tipo.toUpperCase()}  |  <strong>Ejercicios:</strong> ${cantidadEjercicios}</p>
    <div class="ejercicio-item"><h3>🧘 INICIO - CALENTAMIENTO Y MOVILIDAD (10 min)</h3>
    <p>🔁 Estiramientos dinámicos: giros, brazos, cadera, zancadas, trote, skipping.<br> 
    🏀 Material: ninguno o conos.<br>
    <div class="grafico-svg">${generarSVG("calentamiento")}</div>
    </div>`;
    
    for (let i = 0; i < ejerciciosSeleccionados.length; i++) {
      const ex = ejerciciosSeleccionados[i];
      const duracion = duraciones[i];
      html += `<div class="ejercicio-item">
        <h3>⏱️ Ejercicio ${i+1}: ${ex.nombre} (${duracion} minutos)</h3>
        <p><strong>🎯 Enfoque:</strong> ${ex.tipo.toUpperCase()}  |  <strong>🧰 Material:</strong> ${ex.material}</p>
        <p><strong>📝 Explicación:</strong> ${ex.nombre}. ${ex.descripcion}</p>
        <div class="grafico-svg">${generarSVG(ex.tipo)}</div>
      </div>`;
    }
    
    html += `<div class="ejercicio-item"><h3>🧘 FINAL - VUELTA A LA CALMA Y ESTIRAMIENTOS (10 min)</h3>
    <p>🧘‍♂️ Estiramientos estáticos (20-30 seg): isquiotibiales, cuádriceps, gemelos, espalda baja, hombros.<br>
    🧘 Material: colchoneta.<br>
    <div class="grafico-svg">${generarSVG("estiramientos")}</div>
    </div>
    <hr><p>✅ Plan generado automáticamente. Ajusta intensidad según el equipo. ¡Disfruta!</p></div>`;
    
    document.getElementById("resultado").innerHTML = html;
  }
  
  document.getElementById("generarBtn").addEventListener("click", generarEntrenamiento);
  document.getElementById("exportarPdfBtn").addEventListener("click", () => {
    window.print();
  });
  window.addEventListener("load", generarEntrenamiento);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.log('Error SW:', err));
    });
  }
</script>
</body>
</html>
