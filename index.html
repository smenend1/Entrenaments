<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a472a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HoopsTrainer">
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #1a472a; margin: 0; padding: 20px; color: #fff; }
    .container { max-width: 1000px; margin: 0 auto; background: #2c5e3a; border-radius: 32px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    h1 { text-align: center; margin-top: 0; font-size: 1.8rem; }
    .form-group { background: #1f3b2c; padding: 12px 18px; border-radius: 28px; margin-bottom: 16px; }
    label { font-weight: bold; display: block; margin-bottom: 6px; }
    select, button { width: 100%; padding: 12px; border-radius: 40px; border: none; font-size: 1rem; background: #f9c74f; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button { background: #f9844a; color: white; font-size: 1.2rem; margin-top: 8px; }
    button:hover { background: #f2702e; transform: scale(0.98); }
    .boton-pdf { background: #577590; margin-top: 0; margin-bottom: 10px; }
    .boton-pdf:hover { background: #3a5a6e; }
    .resultado { background: #f8f3e6; color: #1e2f23; border-radius: 28px; padding: 20px; margin-top: 25px; overflow-x: auto; min-height: 200px; }
    .ejercicio-item { border-bottom: 1px solid #c0b28a; margin-bottom: 18px; padding-bottom: 12px; }
    .grafico-svg { background: #e8e0d0; padding: 10px; border-radius: 20px; margin: 10px 0; display: flex; justify-content: center; }
    .grafico-svg svg { max-width: 100%; height: auto; border-radius: 12px; background: #f0ece4; }
    h3 { margin: 10px 0 5px; color: #b6622e; }
    footer { text-align: center; font-size: 0.7rem; margin-top: 20px; opacity: 0.7; }
    .debug { background: #34495e; color: #ecf0f1; padding: 10px; border-radius: 12px; margin-top: 10px; font-size: 0.8rem; white-space: pre-wrap; }
    .error { background: #e74c3c; color: white; padding: 10px; border-radius: 12px; margin: 10px 0; }
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .container { background: white; box-shadow: none; padding: 0; max-width: 100%; }
      .form-group, .boton-pdf, button, footer, h1, #generarBtn, .boton-pdf, .debug { display: none; }
      .resultado { background: white; color: black; padding: 0; margin: 0; border-radius: 0; }
      .ejercicio-item { border-bottom: 1px solid #ccc; page-break-inside: avoid; }
      .grafico-svg { background: #f5f5f5; border: 1px solid #ccc; }
      .grafico-svg svg { background: white; }
      h2, h3 { color: black; }
    }
    @media (max-width: 600px) { body { padding: 10px; } .container { padding: 15px; } h1 { font-size: 1.4rem; } }
  </style>
</head>
<body>
<div class="container">
  <h1>🏀 PLANIFICADOR DE ENTRENAMIENTOS</h1>
  <div class="form-group">
    <label>📅 Edad</label>
    <select id="edad">
      <option value="7-10">7-10 años</option>
      <option value="11-14" selected>11-14 años</option>
      <option value="15-18">15-18 años</option>
    </select>
  </div>
  <div class="form-group">
    <label>📊 Nivel</label>
    <select id="nivel">
      <option value="principiante">Principiante</option>
      <option value="intermedio" selected>Intermedio</option>
      <option value="avanzado">Avanzado</option>
    </select>
  </div>
  <div class="form-group">
    <label>🏋️ Tipo principal</label>
    <select id="tipo">
      <option value="fuerza">💪 Fuerza</option>
      <option value="velocidad">⚡ Velocidad</option>
      <option value="defensa">🛡️ Defensa</option>
      <option value="3x3">🏀 3x3</option>
    </select>
  </div>
  <div class="form-group">
    <label>🔢 Cantidad de ejercicios</label>
    <select id="cantidad">
      <option value="4">4</option>
      <option value="5" selected>5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
    </select>
  </div>
  <button id="generarBtn">✨ GENERAR ENTRENAMIENTO</button>
  <button id="exportarPdfBtn" class="boton-pdf">📄 EXPORTAR A PDF</button>
  <div id="resultado" class="resultado">
    <p style="color: #666; text-align: center;">⏳ Cargando entrenamiento...</p>
  </div>
  <div id="debug" class="debug">📌 Depuración: esperando...</div>
  <footer>PWA instalable - Gráficos de pista</footer>
</div>

  // ============================================================
  // 2. FUNCIÓN PARA SELECCIONAR EJERCICIOS (FÁCIL Y ROBUSTA)
  // ============================================================
  function seleccionarEjercicios(edad, tipo, cantidad) {
    const debug = document.getElementById('debug');
    debug.textContent = `🔍 Buscando ejercicios: edad=${edad}, tipo=${tipo}, cantidad=${cantidad}`;
    
    let pool = [];
    // Intentar obtener del tipo seleccionado
    if (DB[edad] && DB[edad][tipo]) {
      pool = [...DB[edad][tipo]];
    }
    
    // Si no hay, usar otro tipo de la misma edad
    if (pool.length === 0) {
      debug.textContent += `\n⚠️ No hay ejercicios para ${tipo} en ${edad}, buscando en otros tipos...`;
      const tipos = ['fuerza', 'velocidad', 'defensa', '3x3'];
      for (let t of tipos) {
        if (t !== tipo && DB[edad] && DB[edad][t]) {
          pool = [...DB[edad][t]];
          debug.textContent += `\n✅ Usando ejercicios de ${t}`;
          break;
        }
      }
    }
    
    // Si aún no hay, usar 11-14 como fallback
    if (pool.length === 0) {
      debug.textContent += `\n⚠️ No hay ejercicios para edad ${edad}, usando 11-14 como fallback...`;
      const fallback = DB['11-14'][tipo] || DB['11-14']['fuerza'];
      pool = [...fallback];
    }
    
    // Mezclar y seleccionar
    const seleccionados = [];
    let tempPool = [...pool];
    for (let i = 0; i < cantidad; i++) {
      if (tempPool.length === 0) {
        tempPool = [...pool]; // reiniciar para repetir
      }
      const idx = Math.floor(Math.random() * tempPool.length);
      seleccionados.push({ ...tempPool[idx] });
      tempPool.splice(idx, 1);
    }
    
    debug.textContent += `\n✅ Seleccionados ${seleccionados.length} ejercicios`;
    return seleccionados;
  }

  // ============================================================
  // 3. GENERADOR DE SVG (SENCILLO Y SIEMPRE FUNCIONAL)
  // ============================================================
  function generarSVG(nombre, tipo) {
    const color = tipo === 'fuerza' ? '#e67e22' : 
                  tipo === 'velocidad' ? '#2980b9' : 
                  tipo === 'defensa' ? '#c0392b' : '#27ae60';
    const emoji = tipo === 'fuerza' ? '💪' : tipo === 'velocidad' ? '⚡' : tipo === 'defensa' ? '🛡️' : '🏀';
    
    let svg = `<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto;">`;
    // Fondo cancha
    svg += `<rect width="500" height="350" fill="#d9c8a9" rx="8" />`;
    svg += `<rect x="15" y="15" width="470" height="320" fill="none" stroke="#8b7355" stroke-width="2" />`;
    svg += `<line x1="250" y1="15" x2="250" y2="335" stroke="#8b7355" stroke-width="2" stroke-dasharray="8,6" />`;
    svg += `<circle cx="250" cy="175" r="30" fill="none" stroke="#8b7355" stroke-width="2" />`;
    svg += `<circle cx="250" cy="175" r="5" fill="#8b7355" />`;
    // Áreas
    svg += `<path d="M15 80 L70 80 L70 270 L15 270 Z" fill="#b8a080" opacity="0.3" />`;
    svg += `<path d="M485 80 L430 80 L430 270 L485 270 Z" fill="#b8a080" opacity="0.3" />`;
    svg += `<line x1="70" y1="80" x2="70" y2="270" stroke="#8b7355" stroke-width="2" />`;
    svg += `<line x1="430" y1="80" x2="430" y2="270" stroke="#8b7355" stroke-width="2" />`;
    svg += `<circle cx="70" cy="175" r="25" fill="none" stroke="#8b7355" stroke-width="2" />`;
    svg += `<circle cx="430" cy="175" r="25" fill="none" stroke="#8b7355" stroke-width="2" />`;
    
    // Figura humana genérica
    svg += `<circle cx="250" cy="180" r="22" fill="${color}" />`;
    svg += `<rect x="235" y="202" width="30" height="45" rx="10" fill="${color}" />`;
    svg += `<line x1="235" y1="220" x2="210" y2="270" stroke="${color}" stroke-width="8" stroke-linecap="round" />`;
    svg += `<line x1="265" y1="220" x2="290" y2="270" stroke="${color}" stroke-width="8" stroke-linecap="round" />`;
    // Brazos
    svg += `<line x1="235" y1="210" x2="200" y2="190" stroke="${color}" stroke-width="6" stroke-linecap="round" />`;
    svg += `<line x1="265" y1="210" x2="300" y2="190" stroke="${color}" stroke-width="6" stroke-linecap="round" />`;
    
    // Texto
    svg += `<text x="250" y="50" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">${emoji} ${nombre.substring(0,30)}</text>`;
    svg += `<text x="250" y="320" font-size="14" fill="#2c3e50" text-anchor="middle" font-style="italic">Gráfico de pista</text>`;
    svg += `</svg>`;
    return svg;
  }

  // ============================================================
  // 4. GENERAR ENTRENAMIENTO COMPLETO
  // ============================================================
  function generarEntrenamiento() {
    const debug = document.getElementById('debug');
    debug.textContent = '🔄 Generando entrenamiento...';
    
    try {
      const edad = document.getElementById('edad').value;
      const nivel = document.getElementById('nivel').value;
      const tipo = document.getElementById('tipo').value;
      const cantidad = parseInt(document.getElementById('cantidad').value);
      
      debug.textContent += `\n📋 Parámetros: edad=${edad}, nivel=${nivel}, tipo=${tipo}, cantidad=${cantidad}`;
      
      const ejercicios = seleccionarEjercicios(edad, tipo, cantidad);
      debug.textContent += `\n📌 Ejercicios seleccionados: ${ejercicios.map(e => e.nombre).join(', ')}`;
      
      // Calcular duraciones
      const tiempoPrincipal = 70;
      let duraciones = [];
      let suma = 0;
      for (let i = 0; i < ejercicios.length; i++) {
        let base = ejercicios[i].duracionBase || 6;
        let factor = 1;
        if (nivel === 'principiante') factor = 0.9;
        if (nivel === 'avanzado') factor = 1.1;
        if (edad === '7-10') factor *= 0.8;
        if (edad === '15-18') factor *= 1.1;
        let duracion = Math.max(4, Math.round(base * factor));
        duraciones.push(duracion);
        suma += duracion;
      }
      if (suma > 0 && suma !== tiempoPrincipal) {
        let ajuste = tiempoPrincipal / suma;
        duraciones = duraciones.map(d => Math.max(4, Math.round(d * ajuste)));
        let nuevaSuma = duraciones.reduce((a,b) => a+b, 0);
        if (nuevaSuma !== tiempoPrincipal && duraciones.length > 0) {
          duraciones[0] += (tiempoPrincipal - nuevaSuma);
        }
      }
      
      // Construir HTML
      let html = `<div><h2>🏆 ENTRENAMIENTO DE 90 MINUTOS</h2>
      <p><strong>Edad:</strong> ${edad} | <strong>Nivel:</strong> ${nivel} | <strong>Énfasis:</strong> ${tipo.toUpperCase()} | <strong>Ejercicios:</strong> ${cantidad}</p>
      <div class="ejercicio-item"><h3>🧘 CALENTAMIENTO (10 min)</h3>
      <p>🔁 Estiramientos dinámicos: giros, brazos, cadera, zancadas, trote, skipping.<br>Material: ninguno o conos.</p>
      <div class="grafico-svg">${generarSVG('Calentamiento', 'calentamiento')}</div>
      </div>`;
      
      for (let i = 0; i < ejercicios.length; i++) {
        const ex = ejercicios[i];
        const dur = duraciones[i] || 6;
        html += `<div class="ejercicio-item">
          <h3>⏱️ Ejercicio ${i+1}: ${ex.nombre} (${dur} min)</h3>
          <p><strong>🎯 Enfoque:</strong> ${tipo.toUpperCase()} | <strong>🧰 Material:</strong> ${ex.material || 'Ninguno'}</p>
          <p><strong>📝 Explicación:</strong> ${ex.desc || 'Adaptar a la edad y nivel.'}</p>
          <div class="grafico-svg">${generarSVG(ex.nombre, tipo)}</div>
        </div>`;
      }
      
      html += `<div class="ejercicio-item"><h3>🧘 ESTIRAMIENTOS FINALES (10 min)</h3>
      <p>🧘‍♂️ Estiramientos estáticos (20-30 seg): isquiotibiales, cuádriceps, gemelos, espalda baja, hombros.<br>Material: colchoneta.</p>
      <div class="grafico-svg">${generarSVG('Estiramientos', 'estiramientos')}</div>
      </div>
      <hr><p>✅ Plan generado. Ajusta intensidad según el equipo.</p></div>`;
      
      document.getElementById('resultado').innerHTML = html;
      debug.textContent += '\n✅ Entrenamiento generado correctamente.';
      
    } catch (error) {
      debug.textContent += `\n❌ ERROR: ${error.message}`;
      document.getElementById('resultado').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
      console.error(error);
    }
  }a
