<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Entrenador Baloncesto - Planificador de Entrenamientos</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }
    body {
      background: #1a472a;
      margin: 0;
      padding: 20px;
      color: #fff;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #2c5e3a;
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .form-group {
      background: #1f3b2c;
      padding: 12px 18px;
      border-radius: 28px;
      margin-bottom: 16px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }
    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      border: none;
      font-size: 1rem;
      background: #f9c74f;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button {
      background: #f9844a;
      color: white;
      font-size: 1.2rem;
      margin-top: 8px;
    }
    button:hover {
      background: #f2702e;
      transform: scale(0.98);
    }
    .boton-pdf {
      background: #577590;
      margin-top: 0;
      margin-bottom: 10px;
    }
    .boton-pdf:hover {
      background: #3a5a6e;
    }
    .resultado {
      background: #f8f3e6;
      color: #1e2f23;
      border-radius: 28px;
      padding: 20px;
      margin-top: 25px;
      overflow-x: auto;
    }
    .ejercicio-item {
      border-bottom: 1px solid #c0b28a;
      margin-bottom: 18px;
      padding-bottom: 12px;
    }
    .grafico-svg {
      background: #e8e0d0;
      padding: 10px;
      border-radius: 20px;
      margin: 10px 0;
      display: flex;
      justify-content: center;
    }
    .grafico-svg svg {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      background: #f0ece4;
      box-shadow: inset 0 0 0 1px #c0b28a;
    }
    h3 {
      margin: 10px 0 5px;
      color: #b6622e;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 20px;
      opacity: 0.7;
    }
    /* Estilos para impresión / PDF */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .container {
        background: white;
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }
      .form-group, .boton-pdf, button, footer, h1, #generarBtn, .boton-pdf {
        display: none;
      }
      .resultado {
        background: white;
        color: black;
        padding: 0;
        margin: 0;
        border-radius: 0;
      }
      .ejercicio-item {
        border-bottom: 1px solid #ccc;
        page-break-inside: avoid;
      }
      .grafico-svg {
        background: #f5f5f5;
        border: 1px solid #ccc;
      }
      .grafico-svg svg {
        background: white;
      }
      h2, h3 {
        color: black;
      }
    }
    @media (max-width: 600px) {
      body { padding: 10px; }
      .container { padding: 15px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>

<div class="container">
  <h1>🏀 PLANIFICADOR DE ENTRENAMIENTOS 🏀</h1>
  <div class="form-group">
    <label>📅 Edad</label>
    <select id="edad">
      <option value="7-10">7-10 años</option>
      <option value="11-14" selected>11-14 años</option>
      <option value="15-18">15-18 años</option>
    </select>
  </div>
  <div class="form-group">
    <label>📊 Nivel</label>
    <select id="nivel">
      <option value="principiante">Principiante</option>
      <option value="intermedio" selected>Intermedio</option>
      <option value="avanzado">Avanzado</option>
    </select>
  </div>
  <div class="form-group">
    <label>🏋️ Tipo de ejercicio principal</label>
    <select id="tipo">
      <option value="fuerza">💪 Fuerza</option>
      <option value="velocidad">⚡ Velocidad</option>
      <option value="defensa">🛡️ Defensa</option>
      <option value="3x3">🏀 3x3</option>
    </select>
  </div>
  <div class="form-group">
    <label>🔢 Cantidad de ejercicios (sin contar calentamiento/estiramientos)</label>
    <select id="cantidad">
      <option value="4">4 ejercicios</option>
      <option value="5" selected>5 ejercicios</option>
      <option value="6">6 ejercicios</option>
      <option value="7">7 ejercicios</option>
      <option value="8">8 ejercicios</option>
    </select>
  </div>
  <button id="generarBtn">✨ GENERAR ENTRENAMIENTO DE 90 MIN ✨</button>
  <button id="exportarPdfBtn" class="boton-pdf">📄 EXPORTAR A PDF / IMPRIMIR</button>
  <div id="resultado" class="resultado"></div>
  <footer>PWA instalable - Ejercicios por edad y gráficos de pista</footer>
</div>
